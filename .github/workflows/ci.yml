# this workflow runs CI checks on all pushes and pull requests.
on:
  push:
    branches: [main]
  pull_request:

name: "ci"
jobs:
  # run golangci-lint to lint the golang source code.
  # the configuration is at /.golangci.yml.
  linter:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v7.0.1
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: Lint
        run: mise run lint

  # use nancy to scan for vulnerabilities.
  vulnerability_scanner:
    name: Vulnerability scanner
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v7.0.1
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: nancy
        run: mise exec -- go list -json -m all | docker run -i sonatypecommunity/nancy:latest

  # run golang test suite and collect coverage.
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v7.0.1
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: Test
        run: mise run test
      -
        name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: coverage.out

  # post code coverage report as a PR comment.
  code_coverage:
    name: "Code coverage report"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents:      read
      actions:       read
      pull-requests: write
    steps:
      - uses: fgrosse/go-coverage-report@v1.3.1
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage.out"

  # ensure the project builds successfully.
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v7.0.1
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: Build
        run: mise run build

  # verify licenses/ matches current go.mod dependencies.
  # if this fails, run: mise run licenses
  licenses:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v7.0.1
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: Regenerate licenses
        run: mise run licenses
      -
        name: Check for changes
        run: |
          if ! git diff --exit-code licenses/; then
            echo ""
            echo "ERROR: licenses/ is out of date. Run 'mise run licenses' and commit the result."
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard licenses/)" ]; then
            echo ""
            echo "ERROR: licenses/ has new untracked files. Run 'mise run licenses' and commit the result."
            git ls-files --others --exclude-standard licenses/
            exit 1
          fi
