# this workflow runs when a release was published.
on:
  release:
    types: [published]

name: "release_published"
jobs:
  # Build the binary using GoReleaser
  build_binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      -
        uses: actions/checkout@v6.0.3
      -
        name: Install mise
        uses: jdx/mise-action@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: GoReleaser
        run: mise exec -- goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io
          IMAGE_NAME: eun/merge-with-label
          IS_LATEST_RELEASE: ${{ !github.event.release.prerelease && github.event.release.make_latest != 'false' }}
