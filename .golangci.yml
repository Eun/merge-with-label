version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - mnd
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dogsled:
      max-blank-identifiers: 2
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    exhaustruct:
      include:
        - 'common.*'
    funlen:
      lines: 250
      statements: 150
    gocognit:
      min-complexity: 60
    goconst:
      min-len: 5
      min-occurrences: 5
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
    gocyclo:
      min-complexity: 40
    godot:
      check-all: false
    lll:
      line-length: 140
      tab-width: 1
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nestif:
      min-complexity: 5
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - text: 'shadow: declaration of "err" shadows declaration at line \d+'
        linters:
          - govet
      - text: "var-naming: don't use an underscore in package name"
        linters:
          - revive
      - text: "ST1003: should not use underscores in package names"
        linters:
          - staticcheck
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
          - goconst
          - lll
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/Eun/merge-with-label
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
