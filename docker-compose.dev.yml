version: '3.9'
services:
  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=merge_with_label
    volumes:
      - ./docker/postgres-initdb:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: mwl
      POSTGRES_PASSWORD: mwl
      POSTGRES_DB: merge_with_label
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwl -d merge_with_label"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    command: "server"
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      PostgresDSN: "postgres://mwl:mwl@postgres:5432/merge_with_label?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build: .
    command: "worker"
    volumes:
      - "./private-key.pem:/private-key.pem:ro"
    environment:
      PostgresDSN: "postgres://mwl:mwl@postgres:5432/merge_with_label?sslmode=disable"
      APP_ID: <your app id>
      PRIVATE_KEY: /private-key.pem
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    deploy:
      replicas: 1
