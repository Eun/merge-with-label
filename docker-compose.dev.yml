version: '3.9'
services:
  postgres:
    image: supabase/postgres:17.6.1.151
    command:
      - postgres
      - -c
      - cron.database_name=postgres
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: mwl
      POSTGRES_PASSWORD: mwl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwl -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    command: "server"
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      PostgresDSN: "postgres://mwl:mwl@postgres:5432/postgres?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build: .
    command: "worker"
    volumes:
      - "./private-key.pem:/private-key.pem:ro"
    environment:
      PostgresDSN: "postgres://mwl:mwl@postgres:5432/postgres?sslmode=disable"
      APP_ID: <your app id>
      PRIVATE_KEY: /private-key.pem
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    deploy:
      replicas: 1
