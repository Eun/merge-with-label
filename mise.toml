[tools]
go = "1.25.7"
golangci-lint = "2.12.2"
goreleaser = "2.16.0"
"go:github.com/google/go-licenses" = "latest"

[tasks.build]
description = "Build the merge-with-label binaries"
run = "go build -o ./dist/ ./cmd/..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.test]
description = "Run tests with coverage"
run = "go test -v -count=1 -cover -coverprofile=coverage.out -covermode=atomic ./..."

[tasks.release]
description = "Run GoReleaser (snapshot)"
run = "goreleaser release --snapshot --clean"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf dist coverage.out"

# The licenses and licenses-check tasks live in .mise/tasks/ as executable scripts.
